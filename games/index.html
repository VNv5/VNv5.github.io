<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Games - The Carey Network</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<header class="site-header">
  <img src="../images/logo.png" class="logo" alt="The Carey Network Logo" />
</header>

<main>
  <section class="hero orange-bg"></section>
</main>

<!-- Utility Bar -->
<div id="nav-container"></div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network — All rights reserved.</p>
</footer>

<script>
async function loadNav() {
  const res = await fetch("/components/nav.html");
  const data = await res.text();
  document.getElementById("nav-container").innerHTML = data;

  const icons = document.querySelectorAll(".utility-icon");
  const currentPath = window.location.pathname;

  icons.forEach(icon => {
    const iconPath = new URL(icon.href).pathname;
    if (iconPath === currentPath) {
      icon.classList.add("active");
    }
  });
}

window.addEventListener("load", () => {
  loadNav();

  // GUARANTEED to run after everything loads
  setTimeout(() => {
    document.body.classList.add("loaded");
  }, 50);
});
</script>

</body>
</html>
